<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --paper: #eaf2f2;
        --ink: #123138;
        --ink-70: rgba(18, 49, 56, 0.74);
        --accent: #12798c;
        --lake-light: #3b95a5;
        --lake-deep: #0c5866;
        --font-display: 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Georgia, serif;
        --font-body: 'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 1200px;
        height: 630px;
        background: var(--paper);
        font-family: var(--font-body);
        position: relative;
        overflow: hidden;
      }

      .card {
        position: relative;
        height: 100%;
        padding: 84px 90px 74px;
        display: flex;
        flex-direction: column;
        z-index: 1;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 24px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .brand svg {
        height: 44px;
        width: auto;
      }

      .name {
        margin: auto 0 0;
        font-family: var(--font-display);
        font-weight: 400;
        font-size: 104px;
        line-height: 1.02;
        letter-spacing: -0.01em;
        background: linear-gradient(115deg, var(--lake-deep) 10%, var(--accent) 48%, var(--lake-light) 92%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .tagline {
        margin: 26px 0 auto;
        font-size: 36px;
        line-height: 1.4;
        color: var(--ink-70);
        max-width: 21em;
      }

      .url {
        font-size: 27px;
        color: var(--accent);
      }

      .watermark {
        position: absolute;
        right: -30px;
        bottom: -60px;
        height: 620px;
        width: auto;
        z-index: 0;
      }

      .watermark path {
        fill: var(--accent);
        opacity: 0.16;
      }

      .edge {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 10px;
        background: linear-gradient(90deg, var(--lake-deep), var(--accent), var(--lake-light));
        z-index: 2;
      }
    </style>
  </head>
